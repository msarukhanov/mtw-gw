<!--BASE & ROUTING-->
<script>
    const baseUrl = (location.hostname === 'localhost') ? 'http://localhost:3000' : 'https://mtw-gw.onrender.com';
    const baseUrlApi = baseUrl + '/api';

    let currentUser = null;
    let currentBalance = 0;
    let serverConfig = null;
    const socket = io(baseUrl);

    let globalSessionId = null;
    let sidebarMode = 'LIVE';

    // Элементы интерфейса (общие для всех вкладок)
    const usernameLabel = document.getElementById('usernameLabel');
    const balanceLabel = document.getElementById('balanceLabel');
    const authBtn = document.getElementById('authBtn');

    let fullLine = [];
    let oddsCache = {};
    let selectedSport = '⚽ Football';
    let betSlipItems = []; // Массив для хранения нескольких выбранных исходов


    let canvasAnimationId = null; // Для управления циклом requestAnimationFrame
    let canvasCurrentBall = { x: 300, y: 175 }; // Текущие координаты мяча (плавные)
    let canvasTargetBall = { x: 300, y: 175 };  // Точка, куда мяч летит


    function updateUIProfile() {
        if (currentUser) {
            if (usernameLabel) usernameLabel.innerText = currentUser;
            if (balanceLabel) balanceLabel.innerText = currentBalance;
            if (authBtn) authBtn.innerText = "Logout";
        } else {
            if (usernameLabel) usernameLabel.innerText = "Guest";
            if (balanceLabel) balanceLabel.innerText = "0";
            if (authBtn) authBtn.innerText = "Login";
        }
    }

    async function handleAuth() {
        if (currentUser) {
            // Разлогин
            currentUser = null;
            currentBalance = 0;
            serverConfig = null;
            updateUIProfile();
            clearAllGamesUI(); // функция сброса полей (очистка билетов, слотов и т.д.)
            renderGeneralHistory([]); // очищаем историю на экране
        } else {
            // Логин
            const name = prompt("Enter your login (letters, numbers, underscores only):", "Player_1");
            if (!name) return;

            try {
                const response = await fetch(baseUrlApi + '/auth', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: name })
                });
                const data = await response.json();

                if (data.error) return alert(data.error);

                // Сохраняем данные, присланные сервером
                currentUser = data.username;
                currentBalance = data.balance;
                jackpot = data.jackpot;
                serverConfig = data.config; // сохраняем цены и пулы символов бэкенда

                // Подключаем вебсокет к персональной комнате игрока на сервере для личных уведомлений
                socket.emit('join_game', currentUser);

                updateUIProfile();
                loadMyActiveBets();

                if (typeof updateBetButtonState === 'function') updateBetButtonState();
            } catch (err) {
                console.error("Auth error:", err);
                alert("Server connection failed. Is Node.js running?");
            }
        }
    }

    // Чтение всех параметров из URL
    function getAppRoute() {
        const urlParams = new URLSearchParams(window.location.search);
        return {
            sessionId: urlParams.get('session_id') || globalSessionId,
            sport: urlParams.get('sport') || '⚽ Football', // по умолчанию
            league: urlParams.get('league') || null,
            matchId: urlParams.get('match') || null,

            eventType: urlParams.get('eventType') || null,
            hidePlayer: urlParams.get('hidePlayer') || null,
            hideSidebar: urlParams.get('hideSidebar') || null,
        };
    }

    // Изменение URL без перезагрузки страницы (History API)
    function navigateTo(params = {}) {
        const url = new URL(window.location.href);

        // Сохраняем сессию, если она есть
        if (globalSessionId) url.searchParams.set('session_id', globalSessionId);

        // Обновляем или удаляем параметры спорта, лиги и матча
        if (params.sport) url.searchParams.set('sport', params.sport);

        if (params.league) url.searchParams.set('league', params.league);
        else if (params.league === null) url.searchParams.delete('league');

        if (params.matchId) url.searchParams.set('match', params.matchId);
        else if (params.matchId === null) url.searchParams.delete('match');

        window.history.pushState({}, '', url);
        applyRouteState(); // Перерисовываем интерфейс под новый URL
    }

    function applyRouteState() {
        const route = getAppRoute();
        selectedSport = route.sport;

        // Подсвечиваем нужный таб сверху (включая Результаты)
        document.querySelectorAll('.sb-tab-btn').forEach(btn => {
            if (btn.innerText.includes(selectedSport) || btn.getAttribute('data-sport') === selectedSport) {
                btn.classList.add('active');
            } else {
                btn.classList.remove('active');
            }
        });

        // 🔥 ИСПРАВЛЕНО: Если в URL стоит экран результатов — просто рендерим их
        if (selectedSport === '📊 Results') {
            renderResultsList(); // вызываем только отрисовку, без navigateTo внутри!
        } else {
            // Иначе рендерим обычную линию матчей
            renderSportsbook(route);
        }

        // Всегда обновляем левое меню лиг
        renderSidebarMenu();
    }


    function switchSport(sport, btn) {
        navigateTo({
            sport: sport,
            league: null,  // сбрасываем фильтр лиги
            matchId: null  // сбрасываем открытый матч
        });
    }

    // Слушаем кнопку "Назад" в браузере
    window.addEventListener('popstate', applyRouteState);

    // Точка входа при загрузке страницы
    function handleUrlRoutingAndStart() {
        const route = getAppRoute();
        if (route.sessionId) {
            globalSessionId = route.sessionId;
            initSeamlessGame(globalSessionId); // Твой асинхронный логин
        } else {
            updateUIProfile();
        }

        if(route.eventType) {
            setSidebarMode(route.eventType);
        }
        if(route.hideSidebar) {
            document.getElementById('sb-sidebar').style.display = 'none';
        }
        if(route.hidePlayer) {
            document.getElementById('player-bar').style.display = 'none';
        }
        applyRouteState();
    }


    // 4. АСИНХРОННЫЙ СИМЛЕСС ЛОГИН ПРИ ЗАГРУЗКЕ В IFRAME
    async function initSeamlessGame(sessionId) {
        try {
            const response = await fetch(`${baseUrlApi}/auth/seamless`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ sessionId: sessionId })
            });
            const data = await response.json();

            if (data.error) {
                console.error("Seamless login failed:", data.error);
                // Красиво выводим ошибку вместо лобби или поверх открытой игры
                document.getElementById('lobby').innerHTML = `<h3 style="color:#e94560; text-align:center;">Session Expired: ${data.error}</h3>`;
                return;
            }

            currentUser = data.username;
            currentBalance = data.balance;
            jackpot = data.jackpot;
            serverConfig = data.config;

            socket.emit('join_game', currentUser);

            updateUIProfile();
            updateJackpotUI();
            if (typeof applyServerConfigToUI === 'function') applyServerConfigToUI();
            if (typeof updateBetButtonState === 'function') updateBetButtonState();

        } catch (err) {
            console.error("Seamless connection error:", err);
        }
    }

    handleUrlRoutingAndStart();

    // Переключение режима в меню (Live / Прематч)
    function setSidebarMode(mode) {
        sidebarMode = mode;

        document.getElementById('toggleLiveBtn').classList.toggle('active', mode === 'LIVE');
        document.getElementById('togglePrematchBtn').classList.toggle('active', mode === 'PREMATCH');

        const route = getAppRoute();

        // Если сидели в результатах и нажали LIVE/PREMATCH — принудительно переводим на Футбол
        let targetSport = route.sport;
        if (route.sport === '📊 Results') {
            targetSport = '⚽ Football';
        }

        // Переходим. Метод navigateTo сам внутри себя вызовет applyRouteState() один раз!
        navigateTo({
            sport: targetSport,
            league: null,
            matchId: null
        });
    }


    // Рендеринг дерева Вид Спорта -> Лига (Количество матчей)
    function renderSidebarMenu() {
        const container = document.getElementById('sidebarMenuList');
        if (!container) return;

        const route = getAppRoute();

        // 1. Группируем матчи по видам спорта, а внутри них — по лигам
        // При этом фильтруем матчи по выбранному режиму (LIVE или PREMATCH)
        const tree = {};

        fullLine.forEach(match => {
            // Проверяем, подходит ли матч под выбранный фильтр меню
            const isLiveMatch = match.status.includes('LIVE');

                        const trendClass = getOddDirectionClass(m.id, marketKey, outcomeKey, currentOdd);

    function initMatchCanvas(match) {
        if (canvasAnimationId) cancelAnimationFrame(canvasAnimationId);

        const canvas = document.getElementById('matchCanvas');
        if (!canvas) return;
        const ctx = canvas.getContext('2d');

        // 🔥 ИСПРАВЛЕНО: Запоминаем ID матча, который мы сейчас открыли
        const activeMatchId = match.id;

        const zones = [
            { x: 300, y: 175 }, // 0: Центр
            { x: 450, y: 175 }, // 1: Атака хозяев
            { x: 150, y: 175 }, // 2: Атака гостей
            { x: 580, y: 175 }, // 3: ГОЛ хозяев (справа)
            { x: 20,  y: 175 }  // 4: ГОЛ гостей (слева)
        ];

        const initialZone = match.ballZone || 0;
        canvasCurrentBall = { ...zones[initialZone] };
        canvasTargetBall = { ...zones[initialZone] };

        function drawFrame() {
            // Защита от утечки памяти при переходе на другие страницы
            if (!document.getElementById('matchCanvas')) {
                if (canvasAnimationId) cancelAnimationFrame(canvasAnimationId);
                return;
            }

            // 🔥 ИСПРАВЛЕНО: Каждые 16мс ищем свежие данные матча из обновляемого сокетами глобального массива fullLine
            const liveMatch = fullLine.find(m => m.id === activeMatchId);

            // 1. Отрисовка зеленого газона
            ctx.fillStyle = '#2e7d32';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Полосы
            ctx.fillStyle = '#388e3c';
            for (let i = 0; i < canvas.width; i += 60) {
                if ((i / 60) % 2 === 0) ctx.fillRect(i, 0, 30, canvas.height);
            }

            // 2. Разметка поля
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.5)';
            ctx.lineWidth = 3;
            ctx.strokeRect(10, 10, canvas.width - 20, canvas.height - 20);
            ctx.beginPath();
            ctx.moveTo(canvas.width / 2, 10);
            ctx.lineTo(canvas.width / 2, canvas.height - 10);
            ctx.stroke();
            ctx.beginPath();
            ctx.arc(canvas.width / 2, canvas.height / 2, 50, 0, Math.PI * 2);
            ctx.stroke();
            ctx.strokeRect(10, 75, 90, 200);
            ctx.strokeRect(canvas.width - 100, 75, 90, 200);

            // Ворота
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(2, 140, 8, 70);
            ctx.fillRect(canvas.width - 10, 140, 8, 70);

            // 3. Расчет позиции мяча
            if (liveMatch && liveMatch.ballZone !== undefined) {
                // Мяч летит в зону, которую прислал бэкенд в сокетах
                canvasTargetBall = zones[liveMatch.ballZone];
            }

            // Эффект дриблинга (легкое дрожание в центре поля и зонах атаки)
            let jitterX = 0;
            let jitterY = 0;
            if (liveMatch && liveMatch.ballZone < 3) {
                jitterX = (Math.random() - 0.5) * 12;
                jitterY = (Math.random() - 0.5) * 25;
            }

            // Плавное движение мяча через линейную интерполяцию
            canvasCurrentBall.x += (canvasTargetBall.x + jitterX - canvasCurrentBall.x) * 0.08;
            canvasCurrentBall.y += (canvasTargetBall.y + jitterY - canvasCurrentBall.y) * 0.08;

            // 4. Отрисовка игроков (смещаются по оси X вслед за мячом)
            const homeShift = (canvasCurrentBall.x - 300) * 0.15;
            ctx.fillStyle = '#0f3460'; // Хозяева — синие
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = 2;
            drawPlayer(ctx, 40, 175);
            drawPlayer(ctx, 140 + homeShift, 100);
            drawPlayer(ctx, 140 + homeShift, 250);
            drawPlayer(ctx, 260 + homeShift, 175);

            const awayShift = (canvasCurrentBall.x - 300) * 0.15;
            ctx.fillStyle = '#e94560'; // Гости — красные
            drawPlayer(ctx, canvas.width - 40, 175);
            drawPlayer(ctx, canvas.width - 140 + awayShift, 100);
            drawPlayer(ctx, canvas.width - 140 + awayShift, 250);
            drawPlayer(ctx, canvas.width - 260 + awayShift, 175);

            // 5. Отрисовка мяча
            ctx.fillStyle = '#ffffff';
            ctx.strokeStyle = '#000000';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(canvasCurrentBall.x, canvasCurrentBall.y, 7, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();

            // 6. Табло ГОЛ
            if (liveMatch && liveMatch.ballZone >= 3) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
                ctx.fillRect(0, 120, canvas.width, 110);
                ctx.fillStyle = '#ffb703';
                ctx.font = 'bold 42px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('⚽ GOAL!!! ⚽', canvas.width / 2, 185);
            }

            canvasAnimationId = requestAnimationFrame(drawFrame);
        }

        function drawPlayer(ctx, x, y) {
            ctx.beginPath();
            ctx.arc(x, y, 12, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();
        }

        drawFrame();
    }

    // 🔥 ИСПРАВЛЕНО: Принимаем закодированную строку команд
    function toggleOutcome(matchId, encodedTeams, market, outcome, odds) {
        const teams = decodeURIComponent(encodedTeams); // Раскодируем обратно в нормальный текст

        const matchExists = betSlipItems.some(item => item.matchId === matchId);
        const exactExists = betSlipItems.some(item => item.matchId === matchId && item.market === market && item.outcome === outcome);

        if (exactExists) {
            betSlipItems = betSlipItems.filter(item => !(item.matchId === matchId && item.market === market && item.outcome === outcome));
        } else {
            if (matchExists) {
                betSlipItems = betSlipItems.filter(item => item.matchId !== matchId);
            }
            betSlipItems.push({ matchId, teams, market, outcome, odds });
        }

        renderMatches();
        updateSlipUI();
    }

    function updateSlipUI() {
        const container = document.getElementById('slipItemsContainer');
        const controls = document.getElementById('slipControls');
        const emptyLabel = document.getElementById('slipEmptyLabel');

        if (betSlipItems.length === 0) {
            container.innerHTML = '<div class="slip-empty" id="slipEmptyLabel">Select any odds from the line to bet</div>';
            controls.style.display = 'none';
            return;
        }

        emptyLabel ? emptyLabel.remove() : null;
        controls.style.display = 'block';

        // Рассчитываем общий кэфэкспресса
        let totalOdds = 1;
        container.innerHTML = betSlipItems.map(item => {
            totalOdds *= item.odds;
            return `
                <div class="slip-details" style="position:relative; margin-bottom: 6px;">
                    <b>${item.teams}</b><br>
                    <small style="color:#a0a5b5;">${item.market.toUpperCase()} -> ${item.outcome.toUpperCase()}</small>
                    <span style="position:absolute; right:10px; top:10px; color:#ffb703; font-weight:bold;">${item.odds}</span>
                </div>
            `;
        }).join('');

        totalOdds = parseFloat(totalOdds.toFixed(2));
        document.getElementById('slipBetType').innerText = betSlipItems.length > 1 ? "COMBO (MULTI)" : "SINGLE";
        document.getElementById('slipTotalOdds').innerText = totalOdds;

        calculateSlipWin();
    }

    function getOddDirectionClass(matchId, marketKey, outcomeKey, newOdd) {
        const cacheKey = `${matchId}_${marketKey}_${outcomeKey}`;
        const oldOdd = oddsCache[cacheKey];

        // Обновляем значение в кэше для следующего сравнения
        oddsCache[cacheKey] = newOdd;

        // Если это первая загрузка или коэффициент не изменился
        if (oldOdd === undefined || oldOdd === newOdd) return '';

        // Возвращаем класс в зависимости от направления движения коэффициента
        return newOdd > oldOdd ? 'odd-up' : 'odd-down';
    }

    function calculateSlipWin() {
        const odds = parseFloat(document.getElementById('slipTotalOdds').innerText) || 1;
        const stake = document.getElementById('stakeAmount').value || 0;
        document.getElementById('potWin').innerText = Math.floor(stake * odds) + ' 🪙';
    }

    function clearSlip() {
        betSlipItems = [];
        renderMatches();
        updateSlipUI();
    }

    async function placeSportsBet() {
        // 1. Проверяем, авторизован ли пользователь
        if (!currentUser) return alert('Please login to place a bet!');

        const stake = parseFloat(document.getElementById('stakeAmount').value);
        // 2. Валидация суммы ставки
        if (!stake || stake <= 0) return alert('Please enter a valid stake amount');
        if (stake > currentBalance) return alert('Insufficient funds!');

        // 3. Формируем payload, соответствующий ожиданиям бэкенда
        const payload = {
            username: currentUser,
            sessionId: globalSessionId || "manual_session", // Передаем реальную сессию
            items: betSlipItems.map(i => ({
                matchId: i.matchId,
                market: i.market,
                selectedOutcome: i.outcome // ИСПРАВЛЕНО: бэкенд ищет именно selectedOutcome
            })),
            stake: stake,
            totalOdds: parseFloat(document.getElementById('slipTotalOdds').innerText)
        };

        try {
            const res = await fetch(`${baseUrlApi}/sports/bet`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            const data = await res.json();

            if (res.ok && data.success) {
                alert('Bet placed successfully!');

                // Если бэкенд сразу возвращает обновленный баланс — обновляем его на экране
                if (data.newBalance !== undefined) {
                    currentBalance = data.newBalance;
                    updateUIProfile();
                }

                clearSlip();
                loadMyActiveBets(); // Перезагрузить список, чтобы новая ставка сразу появилась внизу

            } else {
                alert(data.error || 'Betting failed');
            }
        } catch (err) {
            console.error('Bet placement error:', err);
            alert('Network error, please try again.');
        }
    }

    function checkFinishedMatchesInSlip() {
        if (betSlipItems.length === 0) return;

        let wasSlipChanged = false;

        // Фильтруем купон, оставляя только те матчи, которые всё еще есть в линии и не завершены
        betSlipItems = betSlipItems.filter(item => {
            const currentMatch = fullLine.find(m => m.id === item.matchId);

            // Если матч пропал из линии или его статус стал FINISHED
            if (!currentMatch || currentMatch.status.includes('FINISHED')) {
                wasSlipChanged = true;
                console.log(`[Sportsbook] Исход на матч ID ${item.matchId} удален из купона: матч завершен.`);
                return false; // Удаляем из массива betSlipItems
            }
            return true; // Оставляем в купоне
        });

        betSlipItems.forEach(item => {
            const match = fullLine.find(m => m.id === item.matchId);
            if (match && match.markets[item.market] && match.markets[item.market].odds[item.outcome]) {
                if(item.odds !== match.markets[item.market].odds[item.outcome]) {
                    wasSlipChanged = true;
                    item.odds = match.markets[item.market].odds[item.outcome];
                }
            }
        });

        // Если из купона что-то удалилось, обновляем интерфейс купона и перерисовываем кнопки
        if (wasSlipChanged) {
            alert('Some matches in your bet slip have finished and were removed.');

            updateSlipUI();
            // Перерисовываем текущий экран, чтобы убрать подсветку с кнопок удаленного матча
            const route = getAppRoute();
            renderSportsbook(route);
        }
    }

    // Загрузка активных ставок авторизованного игрока

                let html = '';
                for (let bet of data.bets) {
                    // Запрашиваем у бэкенда динамический расчет суммы кэшаута для этого купона
                    const cashoutRes = await fetch(`${baseUrlApi}/sports/cashout-value?betId=${bet._id}`);
                    const cashoutData = await cashoutRes.json();
                    const currentCashout = cashoutData.success ? cashoutData.cashoutValue : 0;

                    html += `
                    <div class="active-bet-card">
                        <div style="display:flex; justify-content:space-between; font-weight:bold; margin-bottom:5px;">
                            <span>${bet.items.length > 1 ? '📜 Express' : '🎫 Single'}</span>
                            <span style="color:#ffb703;">Odds: ${bet.totalOdds}</span>
                        </div>
                        <div style="color:#a0a5b5; font-size:11px; margin-bottom:6px;">
                            ${bet.items.map(i => `• Match ID: ${i.matchId} (${i.selectedOutcome.toUpperCase()})`).join('<br>')}
                        </div>
                        <div>Stake: <b>${bet.stake} 🪙</b></div>

                            ${currentCashout > 0 ? `
                                <button class="cashout-btn" onclick="requestCashout('${bet._id}')">
                            Cash Out: <span style="color:#00f5d4;">${currentCashout} 🪙</span>
                            </button>
                            ` : `<div style="color:#e94560; font-size:11px; margin-top:5px; text-align:center;">Cashout Unavailable</div>`}
                            </div>
                            `;
                }
                list.innerHTML = html;
            } else {
                container.style.display = 'none'; // Скрываем блок, если ставок нет
            }
        } catch (err) {
            console.error('Error loading active bets:', err);
        }
    }

    // Отправка запроса на выполнение выкупа ставки
    async function requestCashout(betId) {
        if (!confirm('Are you sure you want to cash out this bet?')) return;

        try {
            const res = await fetch(`${baseUrlApi}/sports/cashout`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ betId: betId, username: currentUser })
            });
            const data = await res.json();

            if (res.ok && data.success) {
                alert('Cash out successful!');

                // Обновляем баланс игрока на экране, если бэкенд его вернул
                if (data.newBalance !== undefined) {
                    currentBalance = data.newBalance;
                    updateUIProfile();
                }

                loadMyActiveBets(); // Перезагружаем список активных ставок
            } else {
                alert(data.error || 'Cash out failed');
            }
        } catch (err) {
            alert('Network error during cash out');
        }
    }

    document.addEventListener('DOMContentLoaded', loadSportsLine);
</script>


</body>
