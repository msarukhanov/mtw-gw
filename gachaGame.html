<!-- frontend/index.html -->
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MTWTech Gacha</title>
    <style>
        html, body {
            margin: 0; padding: 0; width: 100vw; height: 100vh;
            background-color: #0a0a0a; color: white;
            font-family: Arial, sans-serif; overflow: hidden;
            user-select: none;
            overscroll-behavior: none;
        }

        body {
            padding-top: calc(env(safe-area-inset-top));
            padding-bottom: calc(env(safe-area-inset-bottom));
            padding-left: calc(env(safe-area-inset-left));
            padding-right: calc(env(safe-area-inset-right));
        }

        #wrapper {
            position: absolute;
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            /* Нативный скролл включается на самом теле страницы, пряча системные полосы */
            overflow: auto;
            scrollbar-width: none;
            background: #000;
        }

        #wrapper::-webkit-scrollbar {
            display: none;
        }

        #image-bg {
            position: absolute;
            top: 0;
            left: 0;
            height: 100vh;
            display: block;
            z-index: 1;
            object-fit: cover;
            min-width: 100vw;
        }

        #game-bg {
            position: absolute;
            top: 0;
            left: 0;
            height: 100vh;
            z-index: 2;
            min-width: 100vw;
            /* Убираем overflow отсюда, контейнер просто повторяет размеры картинки */
        }


        /* Вся игра и кнопки лежат в одном статичном слое поверх фона */
        /*#game-ui {*/
            /*position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; pointer-events: none; !* КЛИКИ ПРОЛЕТАЮТ СКВОЗЬ ПУСТОТУ НА ФОН! *!*/
        /*}*/

        #game-ui {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 10; /* Сидит строго поверх панорамы */
            pointer-events: none; /* Клики пролетают сквозь пустые зоны */
        }

        /* Все интерактивные элементы интерфейса возвращают себе кликабельность */
        .ui-element {
            pointer-events: auto !important;
        }

        /* Базовые стили UI */
        .header-panel { display: flex; align-items: center; justify-content: space-around; font-size: 22px; font-weight: bold; background: rgba(34,34,34,0.8); backdrop-filter: blur(10px); border-radius: 8px; }
        .btn { border: none; border-radius: 8px; color: white; font-size: 18px; font-weight: bold; cursor: pointer; }
        .screen-content {
            position: absolute;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;


            border: 2px solid #222;
            border-radius: 4px;
            padding: 16px;
        }
        .list-card { background: rgba(30, 30, 30, 0.9); padding: 25px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; }
        @media (orientation: landscape) {
            #game-bg {
                /* В ландшафте картинка должна занять всю высоту,
                   а ширина будет вычисляться динамически в JS и выползать вбок */
                background-size: 100% 100%;
                background-position: left center;
            }
            #game-bg, #image-bg {
                overflow-y: hidden;
            }
            .list-card { width: 30%; }
        }
        @media (orientation: portrait) {
            #wrapper {
                position: fixed;
                top: 50%;
                left: 50%;
                width: 100vh;
                height: 100vw;
                transform: translate(-50%, -50%) rotate(90deg);
                transform-origin: center;
            }
            #game-bg {
                /* В портрете фиксируем ширину под экран, высота скейлится сама */
                width: 100vh !important;
                height: 100vw;
                background-size: cover;
                background-position: center center;
            }
            #game-ui {
                width: 100vh;
                height: 100vw;
            }
        }
        .pulse { animation: gachaPulse 2s infinite ease-in-out; }
        @keyframes gachaPulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.02); } }

        @keyframes idlePulse {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-1%); }
        }
        .idle_pulse { animation: idlePulse 3s infinite ease-in-out; }


        #game-bg, #image-bg {
            will-change: transform;
        }

        /* Полностью независимая кнопка Fullscreen */
        .global-fullscreen-btn {
            position: fixed;
            bottom: 10px;
            left: 10px; /* Если правый угол занят баром ресурсов, поменяй на left: 10px */
            width: 42px;
            height: 42px;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 4px;
            color: #fff;
            font-size: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 9999; /* Жестко поверх всех окон, диалогов и ифреймов */
            pointer-events: auto;
            user-select: none;
            transition: background 0.2s, transform 0.1s;
        }

        .global-fullscreen-btn:hover {
            background: rgba(0, 0, 0, 0.8);
            border-color: #ffcc00;
        }

        .global-fullscreen-btn:active {
            transform: scale(0.95);
        }

    </style>

    <script src="https://cdn.socket.io/4.8.3/socket.io.min.js"
            integrity="sha384-kzavj5fiMwLKzzD1f8S7TeoVIEi7uKHvbTA3ueZkrzYq75pNQUiUi6Dy98Q3fxb0"
            crossorigin="anonymous"></script>
</head>
<body>
<div id="wrapper">
    <img id="image-bg">
    <div id="game-bg"></div>
    <div id="game-ui"></div>
</div>

<script type="module" src="./gacha/app.js"></script>
</body>
</html>
