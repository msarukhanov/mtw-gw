<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MTWTech Gacha</title>
    <style>
        html, body {
            margin: 0; padding: 0; width: 100dvw; height: 100dvh;
            background-color: #0a0a0a; color: white;
            font-family: Arial, sans-serif; overflow: hidden;
            user-select: none;
            overscroll-behavior: none;
        }

        body {
            padding-top: calc(env(safe-area-inset-top));
            padding-bottom: calc(env(safe-area-inset-bottom));
            padding-left: calc(env(safe-area-inset-left));
            padding-right: calc(env(safe-area-inset-right));
        }

        #wrapper {
            position: absolute;
            margin: 0;
            padding: 0;
            width: 100dvw;
            height: 100dvh;
            /* Нативный скролл включается на самом теле страницы, пряча системные полосы */
            overflow: auto;
            scrollbar-width: none;
            background: #000;
        }

        #wrapper::-webkit-scrollbar {
            display: none;
        }

        #image-bg {
            position: absolute;
            top: 0;
            left: 0;
            height: 100dvh;
            display: block;
            z-index: 1;
            object-fit: cover;
            min-width: 100dvw;
        }

        #game-bg {
            position: absolute;
            top: 0;
            left: 0;
            height: 100dvh;
            z-index: 2;
            min-width: 100dvw;
            /* Убираем overflow отсюда, контейнер просто повторяет размеры картинки */
        }


        /* Вся игра и кнопки лежат в одном статичном слое поверх фона */
        /*#game-ui {*/
            /*position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; pointer-events: none; !* КЛИКИ ПРОЛЕТАЮТ СКВОЗЬ ПУСТОТУ НА ФОН! *!*/
        /*}*/

        #game-ui {
            position: fixed;
            top: 0;
            left: 0;
            width: 100dvw;
            height: 100dvh;
            z-index: 10; /* Сидит строго поверх панорамы */
            pointer-events: none; /* Клики пролетают сквозь пустые зоны */
        }

        /* Все интерактивные элементы интерфейса возвращают себе кликабельность */
        .ui-element {
            pointer-events: auto !important;
        }

        /* Базовые стили UI */
        .header-panel { display: flex; align-items: center; justify-content: space-around; font-size: 22px; font-weight: bold; background: rgba(34,34,34,0.8); backdrop-filter: blur(10px); border-radius: 8px;  z-index:20; }
        .btn { border: none; border-radius: 8px; color: white; font-size: 18px; font-weight: bold; cursor: pointer; }
        .screen-content {
            position: absolute;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;


            /*border: 2px solid #222;*/
            border-radius: 4px;
            padding: 16px;
        }
        .list-card { background: rgba(30, 30, 30, 0.9); padding: 25px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; }

        .global-fullscreen-btn {
            position: fixed;
            bottom: 10px;
            left: 10px;
            width: 42px;
            height: 42px;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 4px;
            color: #fff;
            font-size: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 9999; /* Жестко поверх всех окон, диалогов и ифреймов */
            pointer-events: auto;
            user-select: none;
            transition: background 0.2s, transform 0.1s;
        }

        .global-fullscreen-btn:hover {
            background: rgba(0, 0, 0, 0.8);
            border-color: #ffcc00;
        }

        .global-fullscreen-btn:active {
            transform: scale(0.95);
        }

        @media (orientation: landscape) {
            #game-bg {
                /* В ландшафте картинка должна занять всю высоту,
                   а ширина будет вычисляться динамически в JS и выползать вбок */
                background-size: 100% 100%;
                background-position: left center;
            }
            #game-bg, #image-bg {
                overflow-y: hidden;
            }
            .list-card { width: 30%; }
        }
        @media (orientation: portrait) {
            #wrapper {
                position: fixed;
                top: 50%;
                left: 50%;
                width: 100dvh;
                height: 100dvw;
                transform: translate(-50%, -50%) rotate(90deg);
                transform-origin: center;
            }
            #game-bg {
                /* В портрете фиксируем ширину под экран, высота скейлится сама */
                width: 100dvh !important;
                height: 100dvw;
                background-size: cover;
                background-position: center center;
            }
            #game-ui {
                width: 100dvh;
                height: 100dvw;
            }
        }
        .pulse { animation: gachaPulse 2s infinite ease-in-out; }
        @keyframes gachaPulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.02); } }

        @keyframes idlePulse {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-1%); }
        }
        .idle_pulse { animation: idlePulse 3s infinite ease-in-out; }


        #game-bg, #image-bg {
            will-change: transform;
        }

        /* Анимация пульсации доступного этапа на карте */
        @keyframes pulse_gold_glow {
            0% { transform: scale(1); box-shadow: 0 0 10px #ffcc00; }
            50% { transform: scale(1.1); box-shadow: 0 0 25px #ffcc00, 0 0 40px #ffb300; }
            100% { transform: scale(1); box-shadow: 0 0 10px #ffcc00; }
        }
        .pulse_gold_glow {
            animation: pulse_gold_glow 2s infinite ease-in-out;
        }

        /* Всплывание цифр нанесенного урона на экране боя */
        @keyframes float_up_and_fade {
            0% { transform: translateY(0) scale(0.8); opacity: 0; }
            20% { transform: translateY(-20px) scale(1.2); opacity: 1; }
            80% { transform: translateY(-40px) scale(1); opacity: 1; }
            100% { transform: translateY(-60px) scale(0.8); opacity: 0; }
        }
        .damage-float-text {
            animation: float_up_and_fade 1.2s forwards cubic-bezier(0.25, 1, 0.5, 1);
            text-shadow: 2px 2px 0px #000, -2px -2px 0px #000, 2px -2px 0px #000, -2px 2px 0px #000;
        }

        /* Анимация покачивания героя в режиме ожидания боя (Idle) */
        @keyframes hero_combat_idle {
            0% { transform: translateY(0); }
            50% { transform: translateY(-4px); }
            100% { transform: translateY(0); }
        }
        .hero-combat-idle {
            animation: hero_combat_idle 2.5s infinite ease-in-out;
        }

        /* Эффект получения урона: карточка краснеет и вздрагивает */
        @keyframes hit_flash_effect {
            0% { filter: brightness(1) drop-shadow(0 0 0px rgba(255,0,0,0)); transform: scale(1); }
            15% { filter: brightness(0.6) sepia(1) hue-rotate(-50deg) saturate(5); transform: scale(1.08); box-shadow: 0 0 15px #f44336; }
            100% { filter: brightness(1) sepia(0) hue-rotate(0deg) saturate(1); transform: scale(1); box-shadow: none; }
        }
        .hit-flash {
            animation: hit_flash_effect 0.35s ease-out forwards;
        }



        #checkbox-auto-next:checked + .slider { background-color: #4caf50; border-color: #4caf50; }
        #checkbox-auto-next:checked + .slider:before { transform: translateX(20px); }
        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background-color: white; transition: .3s; border-radius: 50%; }


    </style>

    <script src="https://cdn.socket.io/4.8.3/socket.io.min.js"
            integrity="sha384-kzavj5fiMwLKzzD1f8S7TeoVIEi7uKHvbTA3ueZkrzYq75pNQUiUi6Dy98Q3fxb0"
            crossorigin="anonymous"></script>

    <script type="module" src="https://cdnjs.cloudflare.com/ajax/libs/model-viewer/4.3.1/model-viewer.min.js" integrity="sha512-eiMZ5eI6RgXc/tIDc8xhBiCSnLhWM2rcv5ELxBlJCzO8cLLI+om8LStJXzZ4flfucOSaqzzwlNdlmeDYr6ARUg==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
</head>
<body>
<div id="wrapper">
    <img id="image-bg">
    <div id="game-bg"></div>
    <div id="game-ui"></div>

</div>
