<body>

<div class="game-container">
    <div class="auth-panel">
        <div id="userInfo">Player: <span id="usernameLabel" style="color:#e94560">Guest</span></div>
        <div>Balance: <span class="balance-value" id="balanceLabel">0</span> 🪙</div>
        <button class="login-btn" id="authBtn" onclick="handleAuth()">Login</button>
    </div>

    <div class="jackpot-banner">💥 JACKPOT: <span id="jackpotLabel">1000</span> 🪙</div>
</div>

<div class="game-container" id="mines">
    <div class="mines-wrapper">
        <!-- Панель настроек ставки -->
        <div class="mines-panel">
            <div class="mines-input-group">
                <label>Bet Amount</label>
                <input type="number" id="minesBetInput" class="mines-input" value="10" min="1">
            </div>
            <div class="mines-input-group">
                <label>Mines Count (1-24)</label>
                <input type="number" id="minesCountInput" class="mines-input" value="3" min="1" max="24">
            </div>
        </div>

        <!-- Игровое поле 5х5 -->
        <div class="mines-grid" id="minesGrid"></div>

        <!-- Кнопки управления действиями -->
        <div class="mines-controls">
            <button id="minesStartBtn" class="mines-btn">START GAME</button>
            <button id="minesCashoutBtn" class="mines-btn" disabled>TAKE WIN</button>
        </div>

        <!-- Оповещения игры -->
        <div id="minesMsg" class="mines-msg">Choose bet, mines and press Start!</div>
    </div>
</div>

<script src="../view/scripts/main.js"></script>
<script src="./mines.js"></script>

</body>
</html>
