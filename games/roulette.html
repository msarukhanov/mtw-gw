    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: Arial, sans-serif;
            background: #1a1a2e;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 15px;
        }

        .game-container {
            width: 100%;
            max-width: 400px;
            background: #16213e;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        .jackpot-banner {
            background: linear-gradient(90deg, #951c30, #e94560);
            padding: 10px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-weight: bold;
            font-size: 18px;
            box-shadow: 0 0 15px rgba(233, 69, 96, 0.4);
            animation: pulse 1.5s infinite alternate;
        }
        @keyframes pulse { to { transform: scale(1.02); } }

        .auth-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #0f3460;
            padding: 10px 15px;
            border-radius: 12px;
            margin-bottom: 15px;
            font-size: 14px;
        }

        .login-btn {
            background: #e94560;
            border: none;
            color: white;
            padding: 5px 10px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }

        .balance-value {
            color: #4ecca3;
            font-weight: bold;
        }

        h1 {
            font-size: 22px;
            margin-bottom: 15px;
            color: #e94560;
        }
        /* Панель статуса и таймера */
        .mr-status-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #0f3460;
            padding: 10px 15px;
            border-radius: 12px;
            margin-bottom: 15px;
            font-size: 14px;
            font-weight: bold;
        }

        .mr-timer {
            color: #4ecca3;
            background: #16213e;
            padding: 4px 10px;
            border-radius: 6px;
            font-family: monospace;
            font-size: 16px;
        }

        /* Экран отображения выпавшего числа */
        .mr-wheel-screen {
            background: #16213e;
            border: 2px solid #0f3460;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 110px;
        }

        .mr-ball-placeholder {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: #222831;
            border: 2px solid #8a8ab0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
            transition: all 0.3s ease;
        }

        #mrResultText {
            font-size: 14px;
            color: #8a8ab0;
            font-weight: bold;
        }

        /* Сетка стола ставок */
        .mr-table {
            width: 100%;
            display: flex;
            flex-direction: column;
        }

        .mr-row {
            display: flex;
            gap: 12px;
            width: 100%;
        }

        /* Кнопки ставок */
        .mr-bet-btn {
            flex: 1;
            padding: 15px 10px;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            transition: transform 0.1s, filter 0.2s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .mr-bet-btn:active {
            transform: scale(0.97);
        }

        .mr-bet-btn:disabled {
            filter: brightness(0.4);
            cursor: not-allowed;
        }

        .mr-btn-title {
            font-size: 16px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        /* Пулы фишек (показывают сумму всех ставок на этом секторе) */
        .mr-chips-pool {
            font-size: 12px;
            background: rgba(0, 0, 0, 0.4);
            padding: 2px 8px;
            border-radius: 10px;
            color: #4ecca3;
            font-weight: bold;
        }

        /* Цвета секторов */
        .mr-bg-red {
            background: linear-gradient(135deg, #e94560, #951c30);
            color: #fff;
        }
        .mr-bg-black {
            background: linear-gradient(135deg, #222831, #0f1115);
            color: #fff;
            border: 1px solid #393e46;
        }
        .mr-bg-gray {
            background: linear-gradient(135deg, #0f3460, #16213e);
            color: #fff;
            border: 1px solid #1f4068;
        }

        /* Кастомный селект выбора суммы */
        .mr-amount-selector {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: #0f3460;
            padding: 8px;
            border-radius: 10px;
        }

        .mr-select {
            background: #16213e;
            color: white;
            border: 1px solid #1f4068;
            padding: 4px 8px;
            border-radius: 6px;
            font-weight: bold;
            outline: none;
        }

        /* Анимация пульсации в режиме ожидания */
        @keyframes mrPulseIdle {
            0% { transform: scale(1); box-shadow: 0 0 5px rgba(138, 138, 176, 0.4); }
            100% { transform: scale(1.05); box-shadow: 0 0 15px rgba(138, 138, 176, 0.8); }
        }

        /* Класс для режима ожидания ставок */
        .mr-ball-idle {
            animation: mrPulseIdle 1s infinite alternate ease-in-out;
        }

        /* Анимация бешеного вращения шарика по орбите */
        @keyframes mrOrbitSpin {
            0% { transform: rotate(0deg) translateX(35px) rotate(0deg); }
            100% { transform: rotate(360deg) translateX(35px) rotate(-360deg); }
        }

        /* Класс, запускающий вращение */
        .mr-ball-spinning {
            animation: mrOrbitSpin 0.3s linear infinite;
            background: #ffffff !important;
            border-color: #4ecca3 !important;
            box-shadow: 0 0 20px #4ecca3, 0 0 40px #4ecca3 !important;
        }

        /* Эффект мерцания экрана во время спина */
        @keyframes mrScreenGlow {
            0% { border-color: #0f3460; }
            50% { border-color: #e94560; box-shadow: inset 0 0 15px rgba(233, 69, 96, 0.2); }
            100% { border-color: #0f3460; }
        }

        .mr-screen-spinning {
            animation: mrScreenGlow 0.6s infinite alternate ease-in-out;
        }

        /* Анимация триумфального появления выпавшего числа */
        @keyframes mrPopWin {
            0% { transform: scale(0.5); opacity: 0; }
            70% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        .mr-ball-win {
            animation: mrPopWin 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }


    </style>

    <script src="https://cdn.socket.io/4.8.3/socket.io.min.js" integrity="sha384-kzavj5fiMwLKzzD1f8S7TeoVIEi7uKHvbTA3ueZkrzYq75pNQUiUi6Dy98Q3fxb0" crossorigin="anonymous"></script>

</head>
<body>

<div class="game-container">
    <div class="auth-panel">
        <div id="userInfo">Player: <span id="usernameLabel" style="color:#e94560">Guest</span></div>
        <div>Balance: <span class="balance-value" id="balanceLabel">0</span> 🪙</div>
        <button class="login-btn" id="authBtn" onclick="handleAuth()">Login</button>
    </div>

    <div class="jackpot-banner">💥 JACKPOT: <span id="jackpotLabel">1000</span> 🪙</div>
</div>

<button id="backToLobbyBtn" onclick="goToLobby()" style="display:none; margin: 10px auto; padding: 8px 16px; background: #222831; color: #8a8ab0; border: 1px solid #393e46; border-radius: 8px; cursor: pointer;">⬅ Back to Lobby</button>

<div class="game-container" id="mrGame" style="margin-top: 20px;">
    <h1>🎡 MULTIPLAYER ROULETTE</h1>

    <!-- Шапка игры: Статус и Общий Таймер -->
    <div class="mr-status-panel">
        <div id="mrStatusLabel">Waiting for bets...</div>
        <div class="mr-timer" id="mrTimerLabel">00:15</div>
    </div>

    <!-- Результат последнего выпавшего числа (Экран колеса) -->
    <div class="mr-wheel-screen" id="mrWheelScreen">
        <!-- Добавили класс mr-ball-idle -->
        <div class="mr-ball-placeholder mr-ball-idle" id="mrResultBall">?</div>
        <div id="mrResultText">Place your bets!</div>
    </div>


    <!-- Интерактивный стол ставок -->
    <div class="mr-table">
        <div class="mr-row">
            <!-- Ставка на Красное -->
            <button class="mr-bet-btn mr-bg-red" onclick="mrPlaceBet('color', 'red')">
                <span class="mr-btn-title">RED</span>
                <span class="mr-chips-pool" id="mrPool_red">0 🪙</span>
            </button>

            <!-- Ставка на Черное -->
            <button class="mr-bet-btn mr-bg-black" onclick="mrPlaceBet('color', 'black')">
                <span class="mr-btn-title">BLACK</span>
                <span class="mr-chips-pool" id="mrPool_black">0 🪙</span>
            </button>
        </div>

        <div class="mr-row" style="margin-top: 10px;">
            <!-- Ставка на Четное -->
            <button class="mr-bet-btn mr-bg-gray" onclick="mrPlaceBet('parity', 'even')">
                <span class="mr-btn-title">EVEN</span>
                <span class="mr-chips-pool" id="mrPool_even">0 🪙</span>
            </button>

            <!-- Ставка на Нечетное -->
            <button class="mr-bet-btn mr-bg-gray" onclick="mrPlaceBet('parity', 'odd')">
                <span class="mr-btn-title">ODD</span>
                <span class="mr-chips-pool" id="mrPool_odd">0 🪙</span>
            </button>
        </div>
    </div>

    <!-- Выбор суммы ставки (Фикс-кнопки в вашем стиле) -->
    <div class="mr-amount-selector" style="margin-top: 15px;">
        <span style="font-size: 13px; color: #8a8ab0;">Bet Amount:</span>
        <select id="mrBetAmountSelect" class="mr-select">
            <option value="10">10 🪙</option>
            <option value="20" selected>20 🪙</option>
            <option value="50">50 🪙</option>
            <option value="100">100 🪙</option>
        </select>
    </div>

    <div class="msg-box" id="msgBoxMr" style="margin-top: 20px;">Join the global table!</div>

    <div class="mr-wrapper" style="margin-top: 15px; background: #16213e; padding: 12px; border-radius: 12px;">
        <div class="mr-header" style="color: #8a8ab0; font-size: 12px; text-transform: uppercase; margin-bottom: 8px; font-weight: bold;">
            Active Bets (<span id="mrPlayersCount">0</span>)
        </div>
        <div id="mrActiveBetsList" style="max-height: 120px; overflow-y: auto; display: flex; flex-direction: column; gap: 6px; font-size: 13px; text-align: left;">
            <!-- Сюда JS будет рендерить никнеймы ботов и игроков -->
            <div style="color: #8a8ab0; text-align: center;">Waiting for bets...</div>
        </div>
    </div>
</div>


<div id="lobby" style="height: 0;"></div>

<script src="../view/scripts/main.js"></script>

<script src="./roulette.js"></script>

</body>
</html>
