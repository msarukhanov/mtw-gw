<body>

<div class="game-container">
    <div class="auth-panel">
        <div id="userInfo">Player: <span id="usernameLabel" style="color:#e94560">Guest</span></div>
        <div>Balance: <span class="balance-value" id="balanceLabel">0</span> 🪙</div>
        <button class="login-btn" id="authBtn" onclick="handleAuth()">Login</button>

    <div class="jackpot-banner">💥 JACKPOT: <span id="jackpotLabel">1000</span> 🪙</div>

<div class="game-container" id="slots3x3">

        <!-- Барабан 2 -->
        <div class="reel-window"><div class="reel-strip" id="reel2"></div></div>
        <!-- Барабан 3 -->
        <div class="reel-window"><div class="reel-strip" id="reel3"></div></div>
    </div>

    <div class="bet-info">Cost per spin: <span>10 🪙</span></div>

    <!-- Управление -->
    <button class="spin-btn" id="spinBtn">SPIN!</button>

    <!-- Результат -->
    <div class="msg-box" id="msgBox" style="margin-top: 20px;">Good Luck!</div>
