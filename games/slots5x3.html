    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: Arial, sans-serif;
            background: #1a1a2e;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 15px;
        }

        .game-container {
            width: 100%;
            max-width: 400px;
            background: #16213e;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        .jackpot-banner {
            background: linear-gradient(90deg, #951c30, #e94560);
            padding: 10px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-weight: bold;
            font-size: 18px;
            box-shadow: 0 0 15px rgba(233, 69, 96, 0.4);
            animation: pulse 1.5s infinite alternate;
        }
        @keyframes pulse { to { transform: scale(1.02); } }

        .auth-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #0f3460;
            padding: 10px 15px;
            border-radius: 12px;
            margin-bottom: 15px;
            font-size: 14px;
        }

        .login-btn {
            background: #e94560;
            border: none;
            color: white;
            padding: 5px 10px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }

        .balance-value {
            color: #4ecca3;
            font-weight: bold;
        }

        h1 {
            font-size: 26px;
            margin-bottom: 20px;
            color: #e94560;
            text-shadow: 0 0 10px rgba(233, 69, 96, 0.6);
            letter-spacing: 1px;
        }

        .slots53-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }
        /* Рамка игрового автомата */
        .slots53-machine {
            position: relative;
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 6px;
            background: #070714;
            padding: 10px;
            border-radius: 18px;
            border: 3px solid #e94560;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.9), 0 0 20px rgba(233, 69, 96, 0.3);
            margin-bottom: 15px;
            width: 100%;
            overflow: hidden;
        }
        /* Вертикальный барабан */
        .slots53-reel {
            display: flex;
            flex-direction: column;
            gap: 6px;
            position: relative;
        }
        /* Отдельная ячейка с символом */
        .slots53-cell {
            /*aspect-ratio: 1;*/
            background: #101026;
            border: 1px solid #2d2d5f;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            user-select: none;
            transition: background 0.2s, transform 0.2s;
        }
        .slots53-cell {
            /*aspect-ratio: 1;*/
            /* Изменили background на полупрозрачный темный, чтобы видеть фон подложки */
            background: rgba(16, 16, 38, 0.6);
            border: 1px solid #2d2d5f;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            user-select: none;
            transition: background 0.2s, transform 0.2s;
            z-index: 2; /* Картинка и символ должны быть поверх фона */
        }
        /* Подсветка выигрышного символа на линии */
        .slots53-cell.highlight {
            background: rgba(78, 204, 163, 0.25);
            border-color: #4ecca3;
            box-shadow: 0 0 10px rgba(78, 204, 163, 0.5);
            transform: scale(1.03);
        }
        /* Баннер режима бесплатных вращений */
        .fs-banner {
            width: 100%;
            background: linear-gradient(90deg, #951c30, #e94560);
            padding: 10px;
            border-radius: 12px;
            margin-bottom: 15px;
            font-weight: bold;
            font-size: 16px;
            box-shadow: 0 0 15px rgba(233, 69, 96, 0.4);
            display: none; /* Включается сервером */
            text-align: center;
        }

        .slots53-controls {
            display: flex;
            gap: 12px;
            width: 100%;
            margin-bottom: 15px;
        }
        .slots53-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #e94560, #951c30);
            border: none;
            color: white;
            font-size: 18px;
            font-weight: bold;
            border-radius: 16px;
            cursor: pointer;
            letter-spacing: 1px;
        }
        .slots53-btn:disabled { background: #333344; color: #777; cursor: not-allowed; }

        /* Кнопка меняет цвет в режиме фриспинов */
        .slots53-btn.fs-active {
            background: linear-gradient(135deg, #4ecca3, #2b9371);
            color: #12122c;
        }

        .slots53-msg { min-height: 24px; font-size: 16px; font-weight: bold; color: #8a8ab0; text-align: center; }


        body {
            /* Использовать переменные с дефолтными значениями, если конфиг не загрузился */
            background: var(--body-bg, #1a1a2e);
            color: #fff;
            /* ... ваш прежний код ... */
        }
        .game-container {
            background: var(--container-bg, #16213e);
            /* ... */
        }
        .jackpot-banner, .fs-banner {
            background: var(--banner-bg, linear-gradient(90deg, #951c30, #e94560));
            /* ... */
        }
        .slots53-machine {
            background: var(--machine-bg, #070714);
            border: 3px solid var(--machine-border, #e94560);
            /* ... */
        }
        .slots53-cell {
            background: var(--cell-bg, #101026);
            border: 1px solid var(--cell-border, #2d2d5f);
            /* ... */
        }
        .slots53-cell.highlight {
            background: var(--cell-highlight-bg, rgba(78, 204, 163, 0.25));
            border-color: var(--cell-highlight-border, #4ecca3);
            /* ... */
        }
        .slots53-btn {
            background: var(--btn-spin-bg, linear-gradient(135deg, #e94560, #951c30));
        }
        .slots53-btn.fs-active {
            background: var(--btn-bonus-bg, linear-gradient(135deg, #4ecca3, #2b9371));
        }

    </style>

    <script src="https://cdn.socket.io/4.8.3/socket.io.min.js" integrity="sha384-kzavj5fiMwLKzzD1f8S7TeoVIEi7uKHvbTA3ueZkrzYq75pNQUiUi6Dy98Q3fxb0" crossorigin="anonymous"></script>

</head>
<body>

<!-- Кнопка скрыта по умолчанию через display:none, управление идет из JS -->
<button id="adminConfigBtn" onclick="toggleConfigPanel()" style="display: none; position: fixed; top: 10px; left: 10px; z-index: 1000; padding: 8px 12px; background: #e94560; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold;">⚙ Настроить Слот</button>


<!-- Сама панель управления -->
<div id="configPanel" style="display: none; position: fixed; top: 0; left: 0; width: 340px; height: 100vh; background: #111122; border-right: 2px solid #e94560; z-index: 999; padding: 20px; overflow-y: auto; box-shadow: 5px 0 15px rgba(0,0,0,0.7); font-family: Arial, sans-serif;">
    <h3 style="color: #e94560; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center;">
        <span>Customization</span>
        <button onclick="toggleConfigPanel()" style="background: none; border: none; color: #fff; cursor: pointer; font-size: 20px;">✕</button>
    </h3>

    <!-- Импорт / Экспорт файла -->
    <div style="margin-bottom: 20px; background: #16213e; padding: 10px; border-radius: 8px; border: 1px dashed #e94560;">
        <h4 style="color: #ff9f1c; margin-bottom: 8px; font-size: 14px;">💾 Files</h4>
        <button onclick="exportConfigToFile()" style="width: 100%; padding: 6px; margin-bottom: 8px; background: #2b9371; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 12px;">Export</button>
        <input type="file" id="importFileOpts" accept=".json" onchange="importConfigFromFile()" style="display: none;">
        <button onclick="document.getElementById('importFileOpts').click()" style="width: 100%; padding: 6px; background: #0f3460; color: white; border: 1px solid #e94560; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 12px;">Import</button>
    </div>

    <!-- Настройка фонов -->
    <div style="margin-bottom: 20px;">
        <h4 style="color: #4ecca3; margin-bottom: 10px; border-bottom: 1px solid #333; padding-bottom: 5px;">1. Backgrounds</h4>

        <!-- 1. Основной фон страницы -->
        <label style="display:block; font-size:11px; color:#8a8ab0; margin-bottom: 3px;">1. Main page (Body):</label>
        <input type="file" accept="image/*" id="bgBodyInput" onchange="handleBgLoad('body')" style="font-size: 11px; color: #8a8ab0; width: 100%; margin-bottom: 6px;">
        <div id="previewBgBody" style="width: 100%; height: 40px; border: 1px dashed #444; margin-bottom: 10px; display:flex; align-items:center; justify-content:center; font-size:10px; background-size: cover; background-position: center; color: #8a8ab0;">Default</div>

        <!-- 2. Фон контейнера игры -->
        <label style="display:block; font-size:11px; color:#8a8ab0; margin-bottom: 3px;">2. Game Container:</label>
        <input type="file" accept="image/*" id="bgGameInput" onchange="handleBgLoad('game')" style="font-size: 11px; color: #8a8ab0; width: 100%; margin-bottom: 6px;">
        <div id="previewBgGame" style="width: 100%; height: 40px; border: 1px dashed #444; margin-bottom: 10px; display:flex; align-items:center; justify-content:center; font-size:10px; background-size: cover; background-position: center; color: #8a8ab0;">Default</div>

        <!-- 3. Фон самого слота -->
        <label style="display:block; font-size:11px; color:#8a8ab0; margin-bottom: 3px;">3. Slot Machine:</label>
        <input type="file" accept="image/*" id="bgMachineInput" onchange="handleBgLoad('machine')" style="font-size: 11px; color: #8a8ab0; width: 100%; margin-bottom: 6px;">
        <div id="previewBgMachine" style="width: 100%; height: 40px; border: 1px dashed #444; margin-bottom: 10px; display:flex; align-items:center; justify-content:center; font-size:10px; background-size: cover; background-position: center; color: #8a8ab0;">Default</div>
    </div>

    <!-- Отображение картинок в барабанах -->
    <div style="margin-bottom: 20px;">
        <h4 style="color: #4ecca3; margin-bottom: 10px; border-bottom: 1px solid #333; padding-bottom: 5px;">2. Slot images proportions</h4>
        <select id="cfg_img_fit" style="width: 100%; padding: 8px; background: #222; border: 1px solid #444; color: #fff; border-radius: 4px; font-size: 13px;">
            <option value="square">Square (1:1)</option>
            <option value="portrait">Portrait</option>
            <option value="landscape">Landscape</option>
        </select>
    </div>

    <!-- Секция картинок символов -->
    <div style="margin-bottom: 20px;">
        <h4 style="color: #4ecca3; margin-bottom: 10px; border-bottom: 1px solid #333; padding-bottom: 5px;">3. Upload reel symbols</h4>
        <div id="imageInputsContainer"></div>
    </div>

    <!-- Секция текстов -->
    <div style="margin-bottom: 20px;">
        <h4 style="color: #4ecca3; margin-bottom: 10px; border-bottom: 1px solid #333; padding-bottom: 5px;">4. Change Texts</h4>

        <label style="display:block; font-size:12px; color:#8a8ab0; margin-top:8px;">Namme:</label>
        <input type="text" id="cfg_txt_title" style="width:100%; padding:6px; background:#222; border:1px solid #444; color:#fff; border-radius:4px;">

        <label style="display:block; font-size:12px; color:#8a8ab0; margin-top:8px;">SPIN buttons:</label>
        <input type="text" id="cfg_txt_spin" style="width:100%; padding:6px; background:#222; border:1px solid #444; color:#fff; border-radius:4px;">

        <label style="display:block; font-size:12px; color:#8a8ab0; margin-top:8px;">Greeting:</label>
        <input type="text" id="cfg_txt_welcome" style="width:100%; padding:6px; background:#222; border:1px solid #444; color:#fff; border-radius:4px;">

        <label style="display:block; font-size:12px; color:#8a8ab0; margin-top:8px;">Rotate text:</label>
        <input type="text" id="cfg_txt_rolling" style="width:100%; padding:6px; background:#222; border:1px solid #444; color:#fff; border-radius:4px;">
    </div>

    <button onclick="saveAndApplyConfig()" style="width: 100%; padding: 12px; background: #4ecca3; color: #111; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; margin-bottom: 15px;">Save ad apply</button>
</div>



<div class="game-container">
    <!-- 1. Панель Логина и Баланса -->
    <div class="auth-panel">
        <div id="userInfo">Player: <span id="usernameLabel" style="color:#e94560">Guest</span></div>
        <div>Balance: <span class="balance-value" id="balanceLabel">0</span> 🪙</div>
        <button class="login-btn" id="authBtn" onclick="handleAuth()">Login</button>
    </div>

    <div class="jackpot-banner">💥 JACKPOT: <span id="jackpotLabel">1000</span> 🪙</div>
</div>

<button id="backToLobbyBtn" onclick="goToLobby()" style="display:none; margin: 10px auto; padding: 8px 16px; background: #222831; color: #8a8ab0; border: 1px solid #393e46; border-radius: 8px; cursor: pointer;">⬅ Back to Lobby</button>

<div class="game-container" id="slots53" style="display: block!important;">
    <!-- Верхняя панель игрока -->
    <div class="slots53-wrapper">

        <!-- Баннер бонусной игры -->
        <div id="fsBanner" class="fs-banner">🎰 FREE SPINS MODE: <span id="fsCountLabel">10</span> LEFT</div>

        <!-- Игровое поле 5 барабанов на 3 ряда -->
        <div class="slots53-machine" id="slots53Machine">
            <!-- Колонки будут сгенерированы через JS динамически -->
        </div>

        <div style="margin-bottom: 15px; font-size: 14px; color: #8a8ab0;">
            <span id="labelCostPerSpin">Cost per spin:</span> <span style="color:#fff; font-weight:bold;">20 🪙</span> |
            <span id="labelLines">Lines:</span> <span style="color:#fff; font-weight:bold;">20</span>
        </div>

        <!-- Управление -->
        <button id="slots53SpinBtn" class="slots53-btn">SPIN</button>
        <div id="slots53Msg" class="slots53-msg">Match lines left to right! Wild (W) replaces all icons!</div>
    </div>
</div>

<div id="lobby" style="height: 0;"></div>

<script src="../../view/scripts/main.js"></script>
<script src="./slots5x3.js"></script>

</body>
</html>
