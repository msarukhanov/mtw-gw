<body>

<div class="game-container">
    <div class="auth-panel">
        <div id="userInfo">Player: <span id="usernameLabel" style="color:#e94560">Guest</span></div>
        <div>Balance: <span class="balance-value" id="balanceLabel">0</span> 🪙</div>
        <button class="login-btn" id="authBtn" onclick="handleAuth()">Login</button>
    </div>

    <div class="jackpot-banner">💥 JACKPOT: <span id="jackpotLabel">1000</span> 🪙</div>
</div>

<div class="game-container" id="dice">
    <div class="dice-wrapper">
        <!-- Результат броска -->
        <div class="dice-display">
            <div style="font-size: 12px; color: #8a8ab0; letter-spacing: 1px;">LATEST ROLL</div>
            <div id="diceResultNum" class="dice-result-number">--</div>

            <div class="dice-stats">
                <div>Win Chance: <span id="diceChanceLabel">49%</span></div>
                <div>Multiplier: <span id="diceMultLabel">1.95x</span></div>
            </div>
        </div>

        <!-- Переключатель условий (Больше / Меньше) -->
        <div class="dice-condition-toggle">
            <button id="diceToggleUnder" class="dice-toggle-btn active" onclick="setDiceCondition('under')">Roll Under</button>
            <button id="diceToggleOver" class="dice-toggle-btn" onclick="setDiceCondition('over')">Roll Over</button>
        </div>

        <!-- Поля ввода числовых значений -->
        <div class="dice-panel">
            <div class="dice-input-box">
                <label>Bet Amount</label>
                <input type="number" id="diceBetInput" class="dice-input" value="10" min="1">
            </div>
            <div class="dice-input-box">
                <label id="diceTargetLabel">Target Number (< 50)</label>
                <input type="number" id="diceTargetInput" class="dice-input" value="50" min="2" max="98">
            </div>
        </div>

        <!-- Кнопка броска -->
        <button id="diceRollBtn" class="dice-btn">ROLL DICE</button>
        <div id="diceMsg" class="dice-msg">Set target, bet and roll!</div>
    </div>
</div>

<script src="../view/scripts/main.js"></script>
<script src="./dice.js"></script>

</body>
</html>
