<body>

<div class="game-container">
    <div class="auth-panel">
        <div id="userInfo">Player: <span id="usernameLabel" style="color:#e94560">Guest</span></div>
        <div>Balance: <span class="balance-value" id="balanceLabel">0</span> 🪙</div>
        <button class="login-btn" id="authBtn" onclick="handleAuth()">Login</button>
    </div>

    <div class="jackpot-banner">💥 JACKPOT: <span id="jackpotLabel">1000</span> 🪙</div>
</div>

<div class="game-container" id="bjGame" style="margin-top: 20px;">
    <h1>🃏 BLACKJACK 21</h1>

    <!-- Зона дилера -->
    <div class="bj-wrapper">
        <div class="bj-header">Dealer (<span id="dealerScoreLabel">?</span>)</div>
        <div class="bj-cards-row" id="dealerCards"></div>
    </div>

    <!-- Зона игрока -->
    <div class="bj-wrapper" style="margin-top: 20px;">
        <div class="bj-header">Your Hand (<span id="playerScoreLabel">0</span>)</div>
        <div class="bj-cards-row" id="playerCards"></div>
    </div>

    <div class="bet-info" style="margin-top: 20px;">Cost per game: <span>20 🪙</span></div>

    <!-- Управление -->
    <div style="display: flex; width: 100%; margin-top: 15px;">
        <button class="bj-btn" id="bjDealBtn" onclick="bjDeal()">DEAL</button>

        <div id="bjInGameActionBtns" style="display: none; gap: 12px; width: 100%;">
            <button class="bj-btn bj-btn-hit" id="bjHitBtn" onclick="bjAction('HIT')">HIT</button>
            <button class="bj-btn" id="bjStandBtn" onclick="bjAction('STAND')">STAND</button>
        </div>
    </div>

    <div class="msg-box" id="msgBoxBj" style="margin-top: 20px;">Place a bet and win!</div>
</div>

<script src="../view/scripts/main.js"></script>
<script src="./blackjack.js"></script>

</body>
</html>
