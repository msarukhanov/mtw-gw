    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: Arial, sans-serif;
            background: #1a1a2e;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 15px;
        }

        .game-container {
            width: 100%;
            max-width: 400px;
            background: #16213e;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        .jackpot-banner {
            background: linear-gradient(90deg, #951c30, #e94560);
            padding: 10px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-weight: bold;
            font-size: 18px;
            box-shadow: 0 0 15px rgba(233, 69, 96, 0.4);
            animation: pulse 1.5s infinite alternate;
        }
        @keyframes pulse { to { transform: scale(1.02); } }

        .auth-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #0f3460;
            padding: 10px 15px;
            border-radius: 12px;
            margin-bottom: 15px;
            font-size: 14px;
        }

        .login-btn {
            background: #e94560;
            border: none;
            color: white;
            padding: 5px 10px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }

        .balance-value {
            color: #4ecca3;
            font-weight: bold;
        }

        h1 {
            font-size: 22px;
            margin-bottom: 15px;
            color: #e94560;
        }
        /* Изолированный контейнер для Блэкджека */
        .bj-wrapper {
            background: #0f3460;
            padding: 15px;
            border-radius: 12px;
            text-align: left;
            width: 100%;
            box-sizing: border-box;
        }

        .bj-header {
            font-size: 14px;
            color: #8a8ab0;
            margin-bottom: 12px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Сетка для игральных карт */
        .bj-cards-row {
            display: flex;
            gap: 8px;
            min-height: 90px;
            align-items: center;
            justify-content: center;
            width: 100%;
        }

        /* Специфичные стили самой карты */
        .bj-card-unit {
            width: 60px;
            height: 85px;
            background: #ffffff !important;
            color: #000000 !important;
            border-radius: 6px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 6px;
            font-weight: bold;
            font-size: 18px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.4);
            position: relative;
            user-select: none;
            box-sizing: border-box;
        }

        /* Красные масти */
        .bj-card-unit.bj-red {
            color: #e94560 !important;
        }

        /* Рубашка карты дилера */
        .bj-card-unit.bj-back {
            background: linear-gradient(135deg, #951c30, #e94560) !important;
            border: 2px solid #ffffff;
            color: transparent !important;
            box-shadow: 0 0 10px rgba(233, 69, 96, 0.4);
        }

        /* Уникальные кнопки Блэкджека */
        .bj-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #4ecca3, #2b9371);
            border: none;
            color: #12122c;
            font-size: 20px;
            font-weight: bold;
            border-radius: 16px;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(78, 204, 163, 0.3);
            transition: transform 0.1s, filter 0.2s;
            letter-spacing: 1px;
            box-sizing: border-box;
        }

        .bj-btn:active {
            transform: scale(0.98);
        }

        .bj-btn:disabled {
            background: #333344 !important;
            color: #777 !important;
            box-shadow: none;
            cursor: not-allowed;
        }

        /* Кнопка HIT отдельно */
        .bj-btn-hit {
            background: linear-gradient(135deg, #e94560, #951c30);
            color: white;
            box-shadow: 0 6px 20px rgba(233, 69, 96, 0.3);
        }

        .msg-box {
            min-height: 24px;
            font-size: 18px;
            font-weight: bold;
            color: #e94560;
            text-shadow: 0 0 5px rgba(233, 69, 96, 0.3);
        }


    </style>

    <script src="https://cdn.socket.io/4.8.3/socket.io.min.js" integrity="sha384-kzavj5fiMwLKzzD1f8S7TeoVIEi7uKHvbTA3ueZkrzYq75pNQUiUi6Dy98Q3fxb0" crossorigin="anonymous"></script>

</head>
<body>

<div class="game-container">
    <div class="auth-panel">
        <div id="userInfo">Player: <span id="usernameLabel" style="color:#e94560">Guest</span></div>
        <div>Balance: <span class="balance-value" id="balanceLabel">0</span> 🪙</div>
        <button class="login-btn" id="authBtn" onclick="handleAuth()">Login</button>
    </div>

    <div class="jackpot-banner">💥 JACKPOT: <span id="jackpotLabel">1000</span> 🪙</div>
</div>

<button id="backToLobbyBtn" onclick="goToLobby()" style="display:none; margin: 10px auto; padding: 8px 16px; background: #222831; color: #8a8ab0; border: 1px solid #393e46; border-radius: 8px; cursor: pointer;">⬅ Back to Lobby</button>

<div class="game-container" id="bjGame" style="margin-top: 20px;">
    <h1>🃏 BLACKJACK 21</h1>

    <!-- Зона дилера -->
    <div class="bj-wrapper">
        <div class="bj-header">Dealer (<span id="dealerScoreLabel">?</span>)</div>
        <div class="bj-cards-row" id="dealerCards"></div>
    </div>

    <!-- Зона игрока -->
    <div class="bj-wrapper" style="margin-top: 20px;">
        <div class="bj-header">Your Hand (<span id="playerScoreLabel">0</span>)</div>
        <div class="bj-cards-row" id="playerCards"></div>
    </div>

    <div class="bet-info" style="margin-top: 20px;">Cost per game: <span>20 🪙</span></div>

    <!-- Управление -->
    <div style="display: flex; width: 100%; margin-top: 15px;">
        <button class="bj-btn" id="bjDealBtn" onclick="bjDeal()">DEAL</button>

        <div id="bjInGameActionBtns" style="display: none; gap: 12px; width: 100%;">
            <button class="bj-btn bj-btn-hit" id="bjHitBtn" onclick="bjAction('HIT')">HIT</button>
            <button class="bj-btn" id="bjStandBtn" onclick="bjAction('STAND')">STAND</button>
        </div>
    </div>

    <div class="msg-box" id="msgBoxBj" style="margin-top: 20px;">Place a bet and win!</div>
</div>

<div id="lobby" style="height: 0;"></div>

<script src="../view/scripts/main.js"></script>

<script src="./blackjack.js"></script>


</body>
</html>
