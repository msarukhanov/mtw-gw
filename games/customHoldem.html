<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="../view/styles/gameBase.css">
    <link rel="stylesheet" href="./customHoldem.css">

    <script src="../view/scripts/socket.io.min.js" integrity="sha384-kzavj5fiMwLKzzD1f8S7TeoVIEi7uKHvbTA3ueZkrzYq75pNQUiUi6Dy98Q3fxb0" crossorigin="anonymous"></script>

</head>
<body>

<!-- Кнопка вызова админки (по умолчанию скрыта, включится через ?edit=true) -->
<button id="adminConfigBtn" onclick="toggleConfigPanel()">⚙ Customise Holdem</button>

<!-- Панель кастомизации Холдема -->
<div id="configPanel">
    <h3 style="color: #e94560; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; margin-top: 0;">
        <span>Holdem Customization</span>
        <button onclick="toggleConfigPanel()" style="background: none; border: none; color: #fff; cursor: pointer; font-size: 20px;">✕</button>
    </h3>

    <!-- Импорт / Экспорт файла -->
    <div style="margin-bottom: 20px; background: #16213e; padding: 10px; border-radius: 8px; border: 1px dashed #e94560;">
        <h4 style="color: #ff9f1c; margin-bottom: 8px; font-size: 14px; margin-top: 0;">💾 Files</h4>
        <button onclick="exportConfigToFile()" style="width: 100%; padding: 6px; margin-bottom: 8px; background: #2b9371; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 12px;">Export Theme</button>
        <input type="file" id="importFileOpts" accept=".json" onchange="importConfigFromFile()" style="display: none;">
        <button onclick="document.getElementById('importFileOpts').click()" style="width: 100%; padding: 6px; background: #0f3460; color: white; border: 1px solid #e94560; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 12px;">Import Theme</button>
    </div>

    <!-- Настройка фонов и медиа -->
    <div style="margin-bottom: 20px;">
        <h4 style="color: #4ecca3; margin-bottom: 10px; border-bottom: 1px solid #333; padding-bottom: 5px; margin-top: 0;">1. Visuals & Backgrounds</h4>

        <!-- Рубашка карт -->
        <label style="display:block; font-size:11px; color:#8a8ab0; margin-bottom: 3px;">Card Back:</label>
        <input type="file" accept="image/*" id="cardBackInput" onchange="handleCardBackLoad()" style="font-size: 11px; color: #8a8ab0; width: 100%; margin-bottom: 6px;">
        <div id="previewCardBack" style="width: 50px; height: 70px; border: 1px dashed #444; margin-bottom: 10px; display:flex; align-items:center; justify-content:center; font-size:10px; background-size: cover; background-position: center; color: #8a8ab0;">Default</div>

        <!-- Видеофон стола -->
        <label style="display:block; font-size:11px; color:#8a8ab0; margin-bottom: 3px;">Table Video Background (.mp4):</label>
        <input type="file" accept="video/mp4" id="videoBgInput" onchange="handleVideoLoad()" style="font-size: 11px; color: #8a8ab0; width: 100%; margin-bottom: 10px;">
    </div>

    <!-- Изменение текстов -->
    <div style="margin-bottom: 20px;">
        <h4 style="color: #4ecca3; margin-bottom: 10px; border-bottom: 1px solid #333; padding-bottom: 5px; margin-top: 0;">2. Change Texts</h4>

        <label style="display:block; font-size:12px; color:#8a8ab0; margin-top:8px;">Game Title:</label>
        <input type="text" id="cfg_txt_title" style="width:100%; padding:6px; background:#222; border:1px solid #444; color:#fff; border-radius:4px; box-sizing: border-box;">

        <label style="display:block; font-size:12px; color:#8a8ab0; margin-top:8px;">PLAY button:</label>
        <input type="text" id="cfg_txt_btn" style="width:100%; padding:6px; background:#222; border:1px solid #444; color:#fff; border-radius:4px; box-sizing: border-box;">

        <label style="display:block; font-size:12px; color:#8a8ab0; margin-top:8px;">Greeting:</label>
        <input type="text" id="cfg_txt_welcome" style="width:100%; padding:6px; background:#222; border:1px solid #444; color:#fff; border-radius:4px; box-sizing: border-box;">
    </div>

    <button onclick="saveAndApplyConfig()" style="width: 100%; padding: 12px; background: #4ecca3; color: #111; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; margin-bottom: 15px;">Save and Apply</button>
</div>


<div class="game-container">
    <div class="auth-panel">
        <div id="userInfo">Player: <span id="usernameLabel" style="color:#e94560">Guest</span></div>
        <div>Balance: <span class="balance-value" id="balanceLabel">0</span> 🪙</div>
        <button class="login-btn" id="authBtn" onclick="handleAuth()">Login</button>
    </div>

    <div class="jackpot-banner">💥 JACKPOT: <span id="jackpotLabel">1000</span> 🪙</div>
</div>

<div class="game-container" id="hlGame" style="padding: 0 5px; position: relative; overflow: hidden; background: #121212;">

    <!-- Видеофон: строго muted и playsinline для обхода блокировок браузера -->
    <video id="hlVideoBg" src="../assets/casino/games/elvenHoldem.mp4" muted playsinline preload="auto" style="position: absolute; top: 0; left: 0; width: 100%; object-fit: contain; z-index: 1; pointer-events: none; display: block;"></video>



    <!-- Измененный слой интерфейса: теперь min-height убран, чтобы контейнер не растягивался насильно -->
    <div class="game-content-overlay" style="">

        <!-- Единый горизонтальный ряд для всех карт на столе -->
        <div class="hl-table-row" style="display: flex; justify-content: space-between; align-items: flex-end; width: 100%; padding: 0 5px; box-sizing: border-box;">

            <!-- Левое крыло: Дилер -->
            <div class="hl-wrapper dealer-zone" style="width: 35%;">
                <div class="hl-header">Dealer (<span id="hlDealerComboLabel">?</span>)</div>
                <div class="hl-cards-row" id="hlDealerCards"></div>
            </div>

            <!-- Центр: Общие карты стола (Борд) -->
            <div class="hl-wrapper board-zone" style="width: 25%; background: rgba(78, 204, 163, 0.05) !important; border: 1px dashed rgba(78, 204, 163, 0.3); border-radius: 8px;">
            </div>

            <!-- Правое крыло: Игрок -->
            <div class="hl-wrapper player-zone" style="width: 35%;">
                <div class="hl-header" style="color: #ff5a5f;">You (<span id="hlPlayerComboLabel">?</span>)</div>
                <div class="hl-cards-row" id="hlPlayerCards"></div>
            </div>

        </div>
        <div class="hl-table-row" style="display: flex; justify-content: space-between; align-items: flex-end; width: 100%; padding: 0 10px; box-sizing: border-box;">

            <!-- Левое крыло: Дилер -->
            <div class="hl-wrapper dealer-zone" style="width: 15%;">

            </div>

            <!-- Центр: Общие карты стола (Борд) -->
            <div class="hl-wrapper board-zone" style="width: 65%; background: rgba(78, 204, 163, 0.05) !important; border: 1px dashed rgba(78, 204, 163, 0.3); border-radius: 8px;">
                <div class="hl-header" style="color: #4ecca3;">Board</div>
                <div class="hl-cards-row" id="hlBoardCards"></div>
            </div>

            <!-- Правое крыло: Игрок -->
            <div class="hl-wrapper player-zone" style="width: 15%;">

            </div>

        </div>

        <!-- Нижняя панель управления и инфо -->
        <div style="background: rgba(18, 18, 18, 0.85); padding: 10px; border-radius: 12px; backdrop-filter: blur(5px);">

            <button class="hl-btn" id="hlSpinBtn" onclick="hlSpin()">PLAY HAND <span>20 🪙</span></button>
            <div class="msg-box" id="msgBoxHl" style="margin-top: 10px; text-align: center;">Beat the dealer's poker hand!</div>
        </div>
    </div>
</div>



<script src="../view/scripts/main.js"></script>

<script src="./customHoldem.js"></script>

</body>
</html>
