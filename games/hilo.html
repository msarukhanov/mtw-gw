<body>

<div class="game-container">
    <div class="auth-panel">
        <div id="userInfo">Player: <span id="usernameLabel" style="color:#e94560">Guest</span></div>
        <div>Balance: <span class="balance-value" id="balanceLabel">0</span> 🪙</div>
        <button class="login-btn" id="authBtn" onclick="handleAuth()">Login</button>
    </div>

    <div class="jackpot-banner">💥 JACKPOT: <span id="jackpotLabel">1000</span> 🪙</div>
</div>

<div class="game-container" id="hilo">
    <div class="hilo-wrapper">
        <!-- Экран отображения карты -->
        <div class="hilo-display">
            <div style="font-size: 12px; color: #8a8ab0; letter-spacing: 1px;">CURRENT CARD</div>

            <!-- Интерактивный DOM карты -->
            <div id="hiloCardView" class="hilo-card">
                <div class="hilo-card-top" id="hiloCardTop">A</div>
                <div class="hilo-card-center" id="hiloCardCenter">♠</div>
                <div class="hilo-card-bottom" id="hiloCardBottom">A</div>
            </div>
        </div>

        <!-- Поле ввода ставки -->
        <div class="hilo-panel">
            <div class="hilo-input-box">
                <label>Bet Amount</label>
                <input type="number" id="hiloBetInput" class="hilo-input" value="10" min="1">
            </div>
        </div>

        <!-- Кнопки выбора направления -->
        <div class="hilo-controls">
            <button id="hiloHigherBtn" class="hilo-action-btn">
                HIGHER / EQUAL
                <span id="hiloHigherMult">1.50x</span>
            </button>
            <button id="hiloLowerBtn" class="hilo-action-btn">
                LOWER / EQUAL
                <span id="hiloLowerMult">1.50x</span>
            </button>
        </div>

        <div id="hiloMsg" class="hilo-msg">Guess if the next card is Higher or Lower!</div>
    </div>
</div>

<script src="../view/scripts/main.js"></script>
<script src="./hilo.js"></script>

</body>
</html>
